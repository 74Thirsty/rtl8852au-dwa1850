name: Hardware support request / Hardware-ondersteuning aanvragen
description: Add support for a USB adapter that uses the RTL8852AU or RTL8832AU chipset. / Vraag ondersteuning voor een USB-adapter met de RTL8852AU- of RTL8832AU-chipset.
title: "[hw] "
labels: ["hardware", "needs-triage"]
body:
  - type: input
    id: device_name
    attributes:
      label: Device name / Apparaatnaam
      placeholder: "TP-Link Archer TX20U Plus"
    validations:
      required: true

  - type: input
    id: usb_id
    attributes:
      label: USB ID
      description: |
        Output of `lsusb` for this device.
        Output van `lsusb` voor dit apparaat.
      placeholder: "2357:013f"
    validations:
      required: true

  - type: input
    id: chipset
    attributes:
      label: Chipset
      description: |
        RTL8852AU or RTL8832AU — usually printed on the PCB, or in the FCC ID lookup.
        RTL8852AU of RTL8832AU — meestal te zien op de PCB of via een FCC ID-lookup.
      placeholder: "RTL8852AU"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence / Bewijs
      description: |
        Output of `lsusb -v -d <vendor:product>` (manufacturer + product strings) helps confirm
        this is really an RTL8852AU. If you've tried loading the driver, paste the dmesg.

        **Privacy:** `lsusb -v` includes the device's serial number on most adapters; redact
        the `iSerial` line if you prefer not to publish it — it isn't required to add the USB ID.

        Output van `lsusb -v -d <vendor:product>` (fabrikant- + product-strings) helpt te
        bevestigen dat dit echt een RTL8852AU is. Heb je de driver geprobeerd te laden,
        plak dan de dmesg.

        **Privacy:** `lsusb -v` bevat op de meeste adapters het serienummer; redigeer
        de `iSerial`-regel als je het niet wilt publiceren — het is niet nodig om de USB-ID toe te voegen.
      render: shell

  - type: checkboxes
    id: tested
    attributes:
      label: I have tested the driver against this device / Ik heb de driver getest tegen dit apparaat
      options:
        - label: "Yes — connection works / Ja — verbinding werkt"
        - label: "Partially — driver loads but doesn't connect / Gedeeltelijk — driver laadt maar maakt geen verbinding"
        - label: "No — requesting support so I can test / Nee — vraag ondersteuning aan om te kunnen testen"
