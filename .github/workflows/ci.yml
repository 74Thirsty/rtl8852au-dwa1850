name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Build the kernel module against multiple distro kernels ─────────────
  build:
    name: Build (${{ matrix.os }}, kernel ${{ matrix.kver }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            kver: "default"
          - os: ubuntu-24.04
            kver: "default"

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dkms \
            xz-utils \
            "linux-headers-$(uname -r)"

      - name: Show toolchain
        run: |
          gcc --version | head -1
          make --version | head -1
          uname -a
          ls -la "/lib/modules/$(uname -r)/build" | head -3

      - name: Verify firmware checksums
        run: |
          sha256sum -c CHECKSUMS.sha256

      - name: Build module
        run: |
          make -j"$(nproc)" 2>&1 | tee build.log
          test -f 8852au.ko

      - name: Module metadata
        run: |
          modinfo ./8852au.ko | head -40

      - name: Count warnings
        run: |
          warn_count=$(grep -cE "warning:" build.log || true)
          err_count=$(grep -cE "^[^[:space:]].*\.c:[0-9]+:[0-9]+: error:" build.log || true)
          echo "errors=${err_count} warnings=${warn_count}" | tee summary.txt

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: build-${{ matrix.os }}
          path: |
            8852au.ko
            build.log
            summary.txt
          if-no-files-found: warn
          retention-days: 7

  # ── DKMS install/remove dry-run (validates the helper scripts) ─────────
  dkms:
    name: DKMS scripts dry-run
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dkms xz-utils "linux-headers-$(uname -r)" shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck dkms-install.sh dkms-remove.sh tests/run_tests.sh

      - name: Install via DKMS
        run: sudo ./dkms-install.sh

      - name: DKMS status
        run: dkms status | grep rtl8852au

      - name: Remove via DKMS
        run: sudo ./dkms-remove.sh

      - name: Verify clean state
        run: |
          if dkms status | grep -q rtl8852au; then
            echo "::error::DKMS entry still present after remove"
            exit 1
          fi

  # ── Python lint + offline tests ────────────────────────────────────────
  python:
    name: Python lint and offline tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          # Runtime deps for dashboard: hash-locked.
          pip install --require-hashes -r dashboard/requirements.txt
          # Dev tools (lint): pinned by major to keep CI hermetic.
          pip install 'ruff~=0.14' 'pyflakes~=3.2'

      - name: Ruff (lint)
        run: |
          ruff check dashboard tests tools

      - name: Pyflakes
        run: |
          pyflakes dashboard tests tools || true  # informational

      - name: Compile-check dashboard and tools
        run: |
          python -m py_compile dashboard/app.py
          python -m py_compile tests/test_driver.py
          python -m py_compile tools/tapo_rtsp_brute.py

      - name: Run test discovery (no hardware)
        run: |
          # Verify the test suite imports and discovers tests cleanly.
          python -c "import tests.test_driver; print('OK:', len([c for c in dir(tests.test_driver) if c.startswith('Test')]), 'test classes')"
